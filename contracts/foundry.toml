[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200

# Named RPC endpoints — use with: forge script ... --rpc-url arc
# ${ARC_RPC_URL} resolves from the environment; scripts/deploy.sh exports
# the repo-root .env before invoking forge.
[rpc_endpoints]
arc = "${ARC_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
